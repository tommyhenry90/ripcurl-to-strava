name = "ripcurl-to-strava"
main = "worker.js"
compatibility_date = "2024-10-01"

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
# STRAVA_CLIENT_ID is public — safe in vars. Used both client-side (for /authorize) and server-side.
STRAVA_CLIENT_ID = "251692"

# STRAVA_CLIENT_SECRET — set via .dev.vars (local) or `wrangler secret put STRAVA_CLIENT_SECRET` (prod)
